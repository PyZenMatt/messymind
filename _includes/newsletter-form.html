<!-- Newsletter Subscription Form -->
<form id="newsletterForm" class="newsletter-form" data-source="{{ include.source | default: 'homepage' }}">
  <div class="form-group mb-3">
    <label for="newsletterEmail" class="form-label d-block mb-2">
      <strong>Rimani aggiornato</strong>
      <span class="badge bg-secondary ms-2">✉️ gratuito</span>
    </label>
    <div class="input-group mb-2">
      <input 
        type="email" 
        class="form-control form-control-lg" 
        id="newsletterEmail"
        name="email" 
        placeholder="tua@email.it" 
        required
        aria-label="Email address"
        aria-describedby="newsletterHelp"
      >
      <button 
        class="btn btn-primary btn-lg" 
        type="submit"
        id="newsletterSubmit"
        aria-label="Subscribe to newsletter"
      >Iscriviti</button>
    </div>
    <small id="newsletterHelp" class="form-text text-muted d-block">
      Una email a settimana. Niente spam. Cancellazione istantanea.
    </small>
  </div>

  <!-- Honeypot field for anti-spam -->
  <input 
    type="text" 
    name="honeypot" 
    style="display: none; position: absolute; left: -9999px;" 
    tabindex="-1"
    autocomplete="off"
    aria-hidden="true"
  />

  <!-- Success/Error messages -->
  <div id="newsletterMessage" class="mt-3" style="display: none;"></div>
</form>

<style>
.newsletter-form {
  animation: fadeIn 0.3s ease-in;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

#newsletterSubmit {
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.2s ease;
}

#newsletterSubmit:disabled {
  opacity: 0.7;
}

#newsletterMessage {
  padding: 0.75rem 1rem;
  border-radius: 0.375rem;
  font-size: 0.95rem;
}

#newsletterMessage.success {
  background-color: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

#newsletterMessage.error {
  background-color: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}
</style>

<script>
(function() {
  'use strict';

  const API_ENDPOINT = 'https://PyZenMatt.pythonanywhere.com/api/contact/newsletter/subscribe/';
  
  function initNewsletterForm() {
    const form = document.getElementById('newsletterForm');
    if (!form) return;

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const emailInput = form.querySelector('input[name="email"]');
      const honeypot = form.querySelector('input[name="honeypot"]');
      const submitBtn = form.querySelector('button[type="submit"]');
      const messageDiv = document.getElementById('newsletterMessage');

      // Honeypot check - if filled, silently ignore
      if (honeypot && honeypot.value.trim()) {
        form.reset();
        return;
      }

      const email = emailInput.value.trim();
      const source = form.dataset.source || 'homepage';

      // Reset message
      messageDiv.style.display = 'none';
      messageDiv.className = 'mt-3';

      // Disable submit button and show loading state
      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Iscrizione in corso...';

      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: email,
            source: source,
            newsletter_type: 'main'
          })
        });

        const result = await response.json();

        if (result.success) {
          // Success response
          messageDiv.className = 'mt-3 success';
          messageDiv.innerHTML = '✅ <strong>Perfetto!</strong> Controlla la tua email di conferma.';
          messageDiv.style.display = 'block';
          
          // Reset form after success
          form.reset();
          submitBtn.textContent = originalText;
          
          // Re-enable button after delay
          setTimeout(() => {
            submitBtn.disabled = false;
          }, 3000);
        } else {
          // Error response from API
          messageDiv.className = 'mt-3 error';
          messageDiv.innerHTML = `❌ <strong>Errore:</strong> ${result.error || 'Si è verificato un errore'}`;
          messageDiv.style.display = 'block';
          
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      } catch (error) {
        // Network or other error
        console.error('Newsletter subscription error:', error);
        messageDiv.className = 'mt-3 error';
        messageDiv.innerHTML = '❌ <strong>Errore di rete:</strong> Controlla la tua connessione e riprova.';
        messageDiv.style.display = 'block';
        
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  }

  // Initialize on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initNewsletterForm);
  } else {
    initNewsletterForm();
  }
})();
</script>
